<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ROYAL OUTFITS{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f8f6; color: #1a1a18; line-height: 1.5; }
    a { color: inherit; text-decoration: none; }

    /* Nav */
    .nav { background: #fff; border-bottom: 1px solid #e8e7e0; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-cart { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid #d8d7d0; border-radius: 8px; font-size: 14px; background: none; cursor: pointer; color: #1a1a18; }
    .nav-cart:hover { background: #f1f0e8; }
    .badge { background: #1a1a18; color: #fff; border-radius: 99px; font-size: 11px; font-weight: 600; padding: 1px 7px; }

    /* Messages */
    .messages { padding: 12px 24px 0; }
    .msg { padding: 10px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 8px; }
    .msg-success { background: #EAF3DE; color: #27500A; }
    .msg-error { background: #FCEBEB; color: #791F1F; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
    .btn-primary { background: #1a1a18; color: #fff; }
    .btn-primary:hover { background: #2d2d2a; }
    .btn-outline { background: none; border-color: #d8d7d0; color: #1a1a18; }
    .btn-outline:hover { background: #f1f0e8; }
    .btn-danger { background: none; border-color: #F09595; color: #791F1F; }
    .btn-danger:hover { background: #FCEBEB; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Footer */
    footer { text-align: center; padding: 40px 24px; color: #888; font-size: 13px; border-top: 1px solid #e8e7e0; margin-top: 60px; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">ROYAL OUTFITS</a>
  <div class="nav-right">
    <a href="/cart/" class="nav-cart">
      🛍 Cart
      {% if cart_count > 0 %}
        <span class="badge">{{ cart_count }}</span>
      {% endif %}
    </a>
  </div>
</nav>

{% if messages %}
<div class="messages">
  {% for message in messages %}
    <div class="msg msg-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

<footer>
  &copy; 2026 ROYAL OUTFITS &mdash; Kwale, Kenya
</footer>
</body>
</html>
